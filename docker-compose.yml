# ============================================================
# 🦀 Krab — Docker Compose
# ============================================================
version: '3.8'

services:
  krab:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: krab
    restart: unless-stopped

    # Environment variables
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - KRAB_DOCKER=true

    # Ports
    ports:
      - "18789:18789"  # Gateway port
      - "3000:3000"    # Webhook server port

    # Volumes for persistent data
    volumes:
      - ./data:/app/data:rw
      - ./config:/app/config:ro

    # Health check
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (res) => process.exit(res.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M

    # Logging
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # Optional: PostgreSQL for production data storage
  postgres:
    image: postgres:15-alpine
    container_name: krab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: krab
      POSTGRES_USER: krab
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-krab_password}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    profiles:
      - postgres

  # Optional: Redis for caching
  redis:
    image: redis:7-alpine
    container_name: krab-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    profiles:
      - redis

  # Optional: Reverse proxy with Nginx
  nginx:
    image: nginx:alpine
    container_name: krab-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/ssl/certs:ro
    depends_on:
      - krab
    profiles:
      - proxy

volumes:
  postgres_data:
  redis_data:

networks:
  default:
    name: krab-network
